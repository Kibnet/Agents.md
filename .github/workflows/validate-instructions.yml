name: Validate instruction catalog

on:
  push:
  pull_request:

jobs:
  validate:
    name: Run instruction validations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate instructions
        shell: pwsh
        run: pwsh ./scripts/validate-instructions.ps1

      - name: Test instruction validator
        shell: pwsh
        run: pwsh ./scripts/test-validate-instructions.ps1 -SkipAgentOperations

  operational-windows:
    name: Run Windows operational contracts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test agent operations
        shell: pwsh
        run: pwsh ./scripts/test-agent-operations.ps1 -Area All
